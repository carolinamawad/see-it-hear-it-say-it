<!DOCTYPE html>
<html>
<head>
  <title>See It, Hear It, Say It</title>

  <style>
    body {
      background: #f0f8ff;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #ffcc70;
      border-radius: 25px;
      padding: 40px;
      font-size: 24px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<h1>Welcome Kids! 🎉</h1>

<div class="grid">

  <div class="card" onclick="go('colors.html')">🎨 Colors</div>
  <div class="card" onclick="go('animals.html')">🐶 Animals</div>
  <div class="card" onclick="go('numbers.html')">🔢 Numbers</div>
  <div class="card" onclick="go('play.html')">🎮 Play</div>

</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
